name: Security Hardening
description: Request non-sensitive security hardening. Use SECURITY.md for vulnerabilities.
title: "[Security]: "
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: "Do not disclose exploitable vulnerabilities or secrets here. Use the private reporting path in SECURITY.md."
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should be hardened, and why?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - Python API
        - GitHub Action
        - Schema
        - Adapter
        - Documentation
    validations:
      required: true
