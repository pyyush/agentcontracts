name: Bug Report
description: Report a reproducible bug in Agent Contracts.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, contract snippets, and command output needed to reproduce. Remove secrets.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "aicontracts 0.2.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, optional adapter SDKs, and relevant CI details.
