name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check tag version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(python -c "from pathlib import Path; ns = {}; exec(Path('src/agent_contracts/_version.py').read_text(encoding='utf-8'), ns); print(ns['__version__'])")"
          test "$TAG_VERSION" = "$PKG_VERSION"
      - name: Install dependencies
        run: python -m pip install -e ".[dev,claude,openai,langchain]" build twine pip-audit
      - name: Lint
        run: python -m ruff check src/ tests/
      - name: Type check
        run: python -m mypy src/agent_contracts
      - name: Test
        run: python -m pytest --cov=agent_contracts --cov-report=term-missing
      - name: Validate canonical contracts
        run: |
          python -m agent_contracts.cli validate AGENT_CONTRACT.yaml
          python -m agent_contracts.cli validate examples/support_triage.yaml
          python -m agent_contracts.cli check-compat examples/support_triage.yaml examples/support_triage.yaml
      - name: Audit project dependencies
        run: python -m pip_audit . --progress-spinner off
      - name: Build package
        run: python -m build
      - name: Check distribution hygiene
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys
          import tarfile
          import zipfile

          forbidden = re.compile(
              r"(^|/)(AGENTS\.md|CLAUDE\.md|docs/plans/|\.omx/|\.pilot/|"
              r"\.dev-session/|\.staff-engineer-state\.json|\.staff-engineer\.json|ROADMAP\.md)$"
          )
          offenders = []
          for artifact in Path("dist").iterdir():
              names: list[str]
              if artifact.suffix == ".whl":
                  with zipfile.ZipFile(artifact) as zf:
                      names = zf.namelist()
              elif artifact.name.endswith(".tar.gz"):
                  with tarfile.open(artifact) as tf:
                      names = tf.getnames()
              else:
                  continue
              offenders.extend(f"{artifact.name}:{name}" for name in names if forbidden.search(name))

          if offenders:
              print("Internal-only files found in release artifacts:")
              print("\n".join(offenders))
              sys.exit(1)
          PY
      - name: Check distributions
        run: python -m twine check dist/*

  publish:
    runs-on: ubuntu-latest
    needs: verify
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build
      - name: Build package
        run: python -m build
      - name: Detect release type
        id: release_type
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          prerelease="false"
          if [[ "$VERSION" == *a* || "$VERSION" == *b* || "$VERSION" == *rc* || "$VERSION" == *.dev* ]]; then
            prerelease="true"
          fi
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.release_type.outputs.prerelease }}
