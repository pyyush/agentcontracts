name: 'Agent Contracts Gate'
description: 'Validate repo-local agent contracts and optionally gate a run verdict artifact'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  contract:
    description: 'Path to contract YAML file(s), space-separated'
    required: true
  verdict:
    description: 'Optional verdict artifact path to gate'
    required: false
    default: ''
  fail-on-warning:
    description: 'Fail if contract validation returns upgrade recommendations'
    required: false
    default: 'false'
  fail-on-warn-outcome:
    description: 'Fail if the verdict outcome is warn'
    required: false
    default: 'false'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  outcome:
    description: 'pass or fail'
    value: ${{ steps.gate.outputs.outcome }}
  tier:
    description: 'Contract tier (0, 1, or 2)'
    value: ${{ steps.gate.outputs.tier }}
  verdict-outcome:
    description: 'Verdict outcome when a verdict artifact is provided'
    value: ${{ steps.gate.outputs.verdict_outcome }}

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install aicontracts
      shell: bash
      # Keep this PyPI pin aligned with the action release tag. Do not tag
      # v1.0.0 until aicontracts==1.0.0 has been published.
      run: python -m pip install aicontracts==1.0.0

    - name: Validate contract and verdict
      id: gate
      shell: bash
      run: |
        set -euo pipefail
        outcome="pass"
        tier=""
        verdict_outcome=""

        for contract in ${{ inputs.contract }}; do
          echo "::group::Validating $contract"
          result=$(python -m agent_contracts.cli validate "$contract" --json-output)
          tier=$(echo "$result" | python -c 'import json,sys; data=json.load(sys.stdin); print(data["tier"])')
          recommendations=$(echo "$result" | python -c 'import json,sys; data=json.load(sys.stdin); print(len(data["recommendations"]))')
          echo "$result"
          echo "::endgroup::"
          if [ "${{ inputs.fail-on-warning }}" = "true" ] && [ "$recommendations" -gt 0 ]; then
            outcome="fail"
          fi
        done

        if [ -n "${{ inputs.verdict }}" ]; then
          echo "::group::Checking verdict ${{ inputs.verdict }}"
          extra_flag=""
          if [ "${{ inputs.fail-on-warn-outcome }}" = "true" ]; then
            extra_flag="--fail-on-warn"
          fi
          if ! python -m agent_contracts.cli check-verdict "${{ inputs.verdict }}" $extra_flag; then
            outcome="fail"
          fi
          verdict_outcome=$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["outcome"])' "${{ inputs.verdict }}")
          echo "::endgroup::"
        fi

        echo "tier=$tier" >> "$GITHUB_OUTPUT"
        echo "outcome=$outcome" >> "$GITHUB_OUTPUT"
        echo "verdict_outcome=$verdict_outcome" >> "$GITHUB_OUTPUT"

        if [ "$outcome" = "fail" ]; then
          exit 1
        fi
