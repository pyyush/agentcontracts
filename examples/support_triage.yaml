# Tier 2 — Composable Contract (retained broader example)

agent_contract: "1.0.0"

identity:
  name: support-triage-agent
  version: "1.0.0"
  description: Triages incoming support tickets with explicit safety and audit hooks.
  authors:
    - Piyush Vyas

contract:
  postconditions:
    - name: produces_classification
      check: "output is not None"
      enforcement: sync_block
      severity: critical

    - name: valid_priority
      check: 'output.priority in ["critical", "high", "medium", "low"]'
      enforcement: sync_block
      severity: critical

    - name: has_routing
      check: 'output.routed_to is not None'
      enforcement: sync_warn
      severity: major
      slo:
        target_rate: 0.99
        window: "24h"

inputs:
  schema:
    type: object
    required: [ticket_id, subject, body]
    properties:
      ticket_id:
        type: string
      subject:
        type: string
      body:
        type: string

  preconditions:
    - name: ticket_not_empty
      check: "len(input.body) > 0"

outputs:
  schema:
    type: object
    required: [priority, category]
    properties:
      ticket_id:
        type: string
      subject:
        type: string
      body:
        type: string
      priority:
        type: string
        enum: ["critical", "high", "medium", "low"]
      category:
        type: string
      routed_to:
        type: string

effects:
  authorized:
    tools:
      - ticket_database.read
      - ticket_database.update_priority
      - ticket_database.assign
      - customer_lookup
      - knowledge_base.search
    network:
      - "https://api.ticketing.internal/*"
      - "https://api.customers.internal/*"
      - "https://kb.internal/*"
    state_writes:
      - "tickets.*"
    filesystem:
      read: []
      write: []
    shell:
      commands: []

  declared:
    tools:
      - ticket_database.read
      - ticket_database.update_priority
      - ticket_database.assign
      - customer_lookup
      - knowledge_base.search
    network:
      - "https://api.ticketing.internal/v2/tickets"
      - "https://api.customers.internal/v1/lookup"
      - "https://kb.internal/search"
    state_writes:
      - "tickets.priority"
      - "tickets.assignment"

resources:
  budgets:
    max_cost_usd: 0.10
    max_tokens: 8000
    max_tool_calls: 15
    max_duration_seconds: 20.0

failure_model:
  errors:
    - name: ticket_not_found
      retryable: false
    - name: database_timeout
      retryable: true
      max_retries: 3

observability:
  traces:
    enabled: true
    sample_rate: 1.0
  violation_events:
    emit: true
    destination: otel
  run_artifact_path: ".agent-contracts/runs/{run_id}/verdict.json"
