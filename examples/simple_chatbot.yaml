# Tier 0 — Minimal Valid Contract

agent_contract: "0.1.0"

identity:
  name: simple-chatbot
  version: "0.1.0"
  description: Basic chatbot with one non-null response guarantee.

contract:
  postconditions:
    - name: produces_response
      check: "output is not None"
      enforcement: sync_block
      severity: critical
