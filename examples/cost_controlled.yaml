# Tier 1 — Enforceable Contract
# Adds cost control plus coding/build shell and file scopes.

agent_contract: "0.1.0"

identity:
  name: cost-controlled-researcher
  version: "0.1.0"
  description: Research helper with strict spend and execution controls.

contract:
  postconditions:
    - name: produces_output
      check: "output is not None"
      enforcement: sync_block
      severity: critical

    - name: output_has_sources
      check: "len(output.sources) > 0"
      enforcement: sync_warn
      severity: major

inputs:
  schema:
    type: object
    required: [query]
    properties:
      query:
        type: string
        minLength: 1

outputs:
  schema:
    type: object
    properties:
      summary:
        type: string
      sources:
        type: array
        items:
          type: string

effects:
  authorized:
    tools: [web_search, document_reader, summarizer]
    network: ["https://api.search-provider.com/*", "https://docs.example.com/*"]
    state_writes: []
    filesystem:
      read: ["docs/**", "README.md"]
      write: ["notes/**"]
    shell:
      commands: ["python -m pytest *"]

resources:
  budgets:
    max_cost_usd: 0.50
    max_tokens: 15000
    max_tool_calls: 10
    max_shell_commands: 2
    max_duration_seconds: 60.0
